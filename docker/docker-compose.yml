version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - forest-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://forest_user:forest_password@postgres:5432/forest_monitoring
      - MONGO_URL=mongodb://mongo:27017/forest_monitoring
    depends_on:
      - postgres
      - mongo
      - redis
    networks:
      - forest-network

  # AI Services
  ai-services:
    build:
      context: .
      dockerfile: Dockerfile.ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    networks:
      - forest-network

  # PostgreSQL Database
  postgres:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=forest_user
      - POSTGRES_PASSWORD=forest_password
      - POSTGRES_DB=forest_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - forest-network

  # MongoDB Database
  mongo:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_DATABASE=forest_monitoring
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - forest-network

  # Redis Cache
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - forest-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  forest-network:
    driver: bridge
